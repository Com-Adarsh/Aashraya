<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aashraya - Cusat Blood Cell</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --blood-red: #8b0000; 
            --pure-black: #000000; 
            --white: #ffffff; 
            --input-bg: #121212;
            --warning-gold: #ffcc00;
        }

        body { 
            background-color: var(--pure-black); 
            color: var(--white); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0;
        }

        .malayalam-font { font-family: 'Anek Malayalam', sans-serif; font-weight: 800; }

        .hero-header { 
            background-color: var(--blood-red); 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 2px solid var(--white);
        }

        .hero-header img { 
            height: 90px; background: white; padding: 5px; border-radius: 12px; margin-bottom: 10px; 
        }

        .hero-header h1 { 
            font-family: 'Anek Malayalam', sans-serif; font-weight: 800; 
            font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; 
        }

        .container { max-width: 550px; margin-top: 30px; }
        
        .card-form { 
            background-color: var(--pure-black); padding: 30px; 
            border: 1px solid var(--white); border-radius: 20px; 
            box-shadow: 0 0 25px rgba(139, 0, 0, 0.3);
        }

        label { font-weight: 600; margin-bottom: 5px; text-transform: uppercase; font-size: 0.75rem; }

        .form-control, .form-select { 
            background-color: var(--input-bg); border: 1px solid var(--white); 
            color: var(--white) !important; padding: 12px; 
        }

        .form-control:focus, .form-select:focus { 
            background-color: #1a1a1a; border-color: var(--blood-red); box-shadow: 0 0 10px rgba(139, 0, 0, 0.6); 
        }

        #eligibilityNotice {
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid var(--warning-gold);
            color: var(--warning-gold);
            border-radius: 10px;
            display: none;
        }

        .btn-submit { 
            background-color: var(--blood-red); color: var(--white); 
            border: 1px solid var(--white); font-weight: bold; 
            padding: 15px; margin-top: 15px; transition: 0.4s;
        }

        .btn-submit:hover { background-color: #660000; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="hero-header">
    <img src="Logo .jpg" alt="Aashraya Logo">
    <h1 class="malayalam-font">ആശ്രയ</h1>
    <p style="font-weight: 600;">CUSAT BLOOD DONATION CELL</p>
</div>

<div class="container mb-5">
    <div class="card card-form">
        <form id="bloodForm">
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="ENTER NAME" required>
            </div>
            
            <div class="row">
                <div class="col-6 mb-3">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" class="form-control" placeholder="+91 XXXXX XXXXX" required>
                </div>
                <div class="col-6 mb-3">
                    <label>Blood Group</label>
                    <select name="blood" class="form-select" required>
                        <option value="">SELECT</option>
                        <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                        <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-6 mb-3">
                    <label>Weight (kg)</label>
                    <input type="number" name="weight" id="weightInput" class="form-control" placeholder="ENTER WEIGHT" required>
                </div>
                <div class="col-6 mb-3">
                    <label>Height (cm)</label>
                    <input type="number" name="height" class="form-control" placeholder="ENTER HEIGHT" required>
                </div>
            </div>

            <div class="mb-3">
                <label>Date of Birth</label>
                <input type="date" name="dob" id="dobInput" class="form-control" placeholder="SELECT DATE OF BIRTH" required>
            </div>

            <div id="eligibilityNotice" class="p-3 mb-3 text-center">
                <small id="eligibilityText"></small>
            </div>

            <div class="mb-3">
                <label>Emergency Availability</label>
                <select name="availability" class="form-select" required>
                    <option value="Anytime">Anytime (Emergency)</option>
                    <option value="Daytime">Daytime Only</option>
                    <option value="Weekends">Weekends Only</option>
                </select>
            </div>

            <div class="mb-3">
                <label>District</label>
                <select name="district" class="form-select" id="districtSelect" required>
                    <option value="">SELECT DISTRICT</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Department / College</label>
                <input type="text" name="college" class="form-control" placeholder="DEPT.OF.[NAME],CUSAT" required>
            </div>

            <div class="mb-3">
                <label>Expected Passing Date</label>
                <input type="month" name="passout" id="passoutInput" class="form-control" placeholder="SELECT PASSING OUT YEAR" required>
            </div>

            <button type="submit" class="btn btn-submit w-100" id="subBtn">REGISTER AS DONOR</button>
        </form>
        <div id="msg" class="mt-4 text-center"></div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyG7oMCDPouD3hJaztRKrxMi57m3Ee_obj61rVuFez3ZNwpSyt2ylYytAmziA4sCX2DQQ/exec';

    // 1. Setup Districts
    const districts = ["Kasargod", "Kannur", "Wayanad", "Kozhikode", "Malappuram", "Palakkad", "Thrissur", "Ernakulam", "Idukki", "Kottayam", "Alappuzha", "Pathanamthitta", "Kollam", "Thiruvananthapuram"];
    districts.forEach(d => document.getElementById('districtSelect').add(new Option(d, d)));

    // 2. Real-time Eligibility Warning
    const weightIn = document.getElementById('weightInput');
    const dobIn = document.getElementById('dobInput');
    const notice = document.getElementById('eligibilityNotice');
    const noticeTxt = document.getElementById('eligibilityText');

    function validateDonor() {
        const weight = parseFloat(weightIn.value);
        const dob = new Date(dobIn.value);
        const age = new Date().getFullYear() - dob.getFullYear();

        if (weight > 0 && weight < 45) {
            notice.style.display = "block";
            noticeTxt.innerText = "⚠ WEIGHT TOO LOW FOR DONATION (MIN 45KG)";
        } else if (dobIn.value && age < 18) {
            notice.style.display = "block";
            noticeTxt.innerText = "⚠ MUST BE 18+ TO DONATE";
        } else {
            notice.style.display = "none";
        }
    }

    weightIn.addEventListener('input', validateDonor);
    dobIn.addEventListener('change', validateDonor);

    // 3. Consolidated Submission Logic
    document.getElementById('bloodForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        const msg = document.getElementById('msg');
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        const currentYear = new Date().getFullYear();

        // Calculate pass-out year from the Month picker
        const passYear = new Date(data.passout).getFullYear();

        // Alumni Check
        if (passYear < currentYear) {
            const confirmAlumni = confirm("System Alert: You have selected a past date. You will be marked 'Ineligible' for campus donation. Proceed?");
            if (!confirmAlumni) return;
        }

        btn.disabled = true;
        btn.innerText = "SYNCING TO REGISTRY...";

        /* This targets the placeholder text in all inputs and selects */
.form-control::placeholder {
    color: rgba(139, 0, 0, 0.5); /* White at 40% opacity */
    font-size: 0.8rem;
    letter-spacing: 1px;
}

/* For older browsers (Firefox/Internet Explorer) */
.form-control::-webkit-input-placeholder { color: rgba(255, 0, 0, 0.4); }
.form-control::-moz-placeholder { color: rgba(255, 0, 0, 0.4); }

        try {
            await fetch(API_URL, {
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(data)
            });
            msg.innerHTML = "<span style='color:#00ff00;'>✔ REGISTRATION SUCCESSFUL</span>";
            e.target.reset();
            notice.style.display = "none";
        } catch (err) {
            msg.innerHTML = "<span style='color:red;'>✖ CONNECTION ERROR. TRY AGAIN.</span>";
        } finally {
            btn.disabled = false;
            btn.innerText = "REGISTER AS DONOR";
        }
    });
</script>
</body>
</html>
