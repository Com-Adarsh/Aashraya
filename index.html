<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashraya - Cusat Blood Cell</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --blood-red: #8b0000; 
            --pure-black: #000000; 
            --white: #ffffff; 
            --input-bg: #121212;
        }

        body { 
            background-color: var(--pure-black); 
            color: var(--white); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 0;
        }

        .malayalam-font {
            font-family: 'Anek Malayalam', sans-serif;
            font-weight: 800;
        }

        .hero-header { 
            background-color: var(--blood-red); 
            padding: 50px 20px; 
            text-align: center; 
            border-bottom: 2px solid var(--white);
            box-shadow: 0 4px 20px rgba(139, 0, 0, 0.5);
        }

        /* Fixed Logo Container */
        .hero-header img { 
            height: 100px; 
            background: white; 
            padding: 5px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
        }

        .hero-header h1 { 
            font-family: 'Anek Malayalam', sans-serif;
            font-weight: 800; 
            font-size: clamp(2.5rem, 8vw, 4rem); /* Responsive size */
            letter-spacing: 1px; 
            margin: 0; 
        }
        
        .hero-header p { font-size: 1.1rem; opacity: 0.9; margin-top: 5px; font-weight: 600; letter-spacing: 1px;}

        .container { max-width: 550px; margin-top: 40px; }
        
        .card-form { 
            background-color: var(--pure-black); 
            padding: 35px; 
            border: 1px solid var(--white); 
            border-radius: 20px; 
            box-shadow: 0 0 25px rgba(139, 0, 0, 0.3);
        }

        label { 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: var(--white);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .form-control, .form-select { 
            background-color: var(--input-bg); 
            border: 1px solid var(--white); 
            color: var(--white) !important; 
            padding: 14px; 
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus { 
            background-color: #1a1a1a; 
            border-color: var(--blood-red); 
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.6); 
        }

        .btn-submit { 
            background-color: var(--blood-red); 
            color: var(--white); 
            border: 1px solid var(--white); 
            font-weight: bold; 
            padding: 16px; 
            margin-top: 25px; 
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-submit:hover { 
            background-color: #660000; 
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        #msg { font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="hero-header">
    <img src="https://drive.google.com/uc?export=view&id=1pWMj9PDTNQKgH5anJ3HYO6lFJTn7NQUy" alt="Ashraya Logo">
    <h1 class="malayalam-font">ആശ്രയ</h1>
    <p>AASHRAYA CUSAT BLOOD DONATION CELL</p>
</div>

<div class="container mb-5">
    <div class="card card-form">
        <form id="bloodForm">
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="ENTER NAME" required>
            </div>
            
            <div class="mb-3">
                <label>Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="+91 XXXXX XXXXX" required>
            </div>

            <div class="row">
                <div class="col-6 mb-3">
                    <label>Blood Group</label>
                    <select name="blood" class="form-select" required>
                        <option value="">SELECT</option>
                        <option>A+</option><option>A-</option>
                        <option>B+</option><option>B-</option>
                        <option>O+</option><option>O-</option>
                        <option>AB+</option><option>AB-</option>
                    </select>
                </div>
                <div class="col-6 mb-3">
                    <label>Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="">SELECT</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Others</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label>Date of Birth</label>
                <input type="date" name="dob" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>District</label>
                <select name="district" class="form-select" id="districtSelect" required>
                    <option value="">SELECT DISTRICT</option>
                </select>
            </div>

            <div class="mb-3">
                <label>College / Department</label>
                <input type="text" name="college" class="form-control" placeholder="DEPT. OF STATISTICS, CUSAT" required>
            </div>

            <div class="mb-3">
                <label>Year of Passing</label>
                <select name="passout" class="form-select" id="yearSelect" required>
                    <option value="">SELECT YEAR</option>
                </select>
            </div>

            <button type="submit" class="btn btn-submit w-100" id="subBtn">SUBMIT REGISTRATION</button>
        </form>
        <div id="msg" class="mt-4 text-center"></div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyG7oMCDPouD3hJaztRKrxMi57m3Ee_obj61rVuFez3ZNwpSyt2ylYytAmziA4sCX2DQQ/exec';

    const districts = ["Kasargod", "Kannur", "Wayanad", "Kozhikode", "Malappuram", "Palakkad", "Thrissur", "Ernakulam", "Idukki", "Kottayam", "Alappuzha", "Pathanamthitta", "Kollam", "Thiruvananthapuram"];
    districts.forEach(d => document.getElementById('districtSelect').add(new Option(d, d)));
    
    for(let y=1970; y<=2070; y++) document.getElementById('yearSelect').add(new Option(y, y));

    document.getElementById('bloodForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        const msgDiv = document.getElementById('msg');
        btn.disabled = true;
        btn.innerText = "PROCESSING...";

        const data = Object.fromEntries(new FormData(e.target).entries());

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            msgDiv.innerHTML = "<span style='color:#00ff00;'>✔ REGISTRATION SUCCESSFUL</span>";
            e.target.reset();
        } catch (err) {
            msgDiv.innerHTML = "<span style='color:#ff0000;'>✖ ERROR - TRY AGAIN</span>";
        } finally {
            btn.disabled = false;
            btn.innerText = "SUBMIT REGISTRATION";
        }
    });
</script>
</body>
</html>
